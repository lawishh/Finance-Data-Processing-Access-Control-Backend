<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <div class="top-bar">
        <h2>Dashboard</h2>
        <div id="userInfo"></div>
    </div>

    <div class="cards">
        <div class="box income">
            <h3>Income</h3>
            <p id="income">0</p>
        </div>

        <div class="box expense">
            <h3>Expense</h3>
            <p id="expense">0</p>
        </div>

        <div class="box balance">
            <h3>Balance</h3>
            <p id="balance">0</p>
        </div>
    </div>

    <h3 style="color:white;margin-top:20px;">Records</h3>

<table id="table" border="1" style="width:100%;color:white;text-align:center;">
    <thead>
        <tr>
            <th>ID</th>
            <th>Amount</th>
            <th>Type</th>
            <th>Category</th>
            <th>Date</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

    <br>
    <button id="addBtn" onclick="goToAdd()">Add Record</button>

</div>

<script src="script.js"></script>
</body>
</html>
